<script type="text/javascript">
(function() {
    var arrows = [
        { type: "gf-arrow-up",    icon: "arrow-up.svg"    },
        { type: "gf-arrow-down",  icon: "arrow-down.svg"  },
        { type: "gf-arrow-left",  icon: "arrow-left.svg"  },
        { type: "gf-arrow-right", icon: "arrow-right.svg" }
    ];
    arrows.forEach(function(a) {
        RED.nodes.registerType(a.type, {
            category:  "GhostForge",
            color:     "#000000",
            showLabel: false,
            defaults:  { name: { value: "" } },
            inputs:    1,
            outputs:   1,
            icon:      a.icon,
            label:     function() { return this.name || a.type; }
        });
    });
})();
</script>
